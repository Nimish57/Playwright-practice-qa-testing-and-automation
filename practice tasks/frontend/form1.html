<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
    <a href="form.html" style="float: right; margin: 10px;">Update Information</a>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh;">
        <h2 style="text-align: center;">Login Page</h2>
        <form style="width: 350px; border: 2px solid black; padding: 15px; border-radius: 5px; margin: 0 auto;">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
            <br><br>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <br><br>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>

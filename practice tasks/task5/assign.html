<!DOCTYPE html>
<html>
<head>
<title>Basic CSS Website with Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background-image: url(https://images-porsche.imgix.net/-/media/0B3F90A75B0141FF8BED694C3C1A323B_7C02423B08CB49C8801E208B2D16A51E_CZ25W18OX0004-911-gt3-white-side?w=2560&h=1440&q=45&crop=faces%2Centropy%2Cedges&auto=format);
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: white;
}
::selection{
    background: black;
    color: white;
}
header{
    text-align: center;
    padding: 20px;
    background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(255,255,255,0.2));
}
nav{
    text-align: center;
    padding: 10px;
    background: rgba(0,0,0,0.5);
}

nav a{
    color: white;
    margin: 0 15px;
    text-decoration: none;
}

nav a:hover{
    color: yellow;
}
.box{
    height: 50px;
    width: 50px;
    background: lightgreen;
    float: left;
    border: 2px solid black;
    margin: 4px;
}
section{
    padding: 20px;
    background: rgba(0,0,0,0.6);
    margin: 20px;
    border-radius: 10px;
}
p{
    clear: both;
}
ul li::marker{
    color: red;
}
form{
    max-width: 400px;
    margin: auto;
}

input, textarea{
    width: 100%;
    padding: 8px;
    margin: 8px 0;
    border: none;
    border-radius: 5px;
}

button{
    width: 100%;
    padding: 10px;
    background: linear-gradient(to right, orange, yellow);
    border: none;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
}

button:hover{
    background: linear-gradient(to right, yellow, orange);
}
body::after{
    content: " 🚀";
    font-size: 24px;
}

footer{
    text-align: center;
    padding: 10px;
    background: rgba(0,0,0,0.6);
}

</style>
</head>

<body>

<header>
<h1>My Basic CSS Website</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

<section>
<h2>CSS Feature Demo</h2>

<div class="box"></div>
<div class="box"></div>
<div class="box"></div>
<div class="box"></div>

<p>
These floating boxes demonstrate float and clear behavior.
Select this text to see custom selection styling!
</p>

<ul>
<li>Custom list markers</li>
<li>Gradient backgrounds</li>
<li>Pseudo elements</li>
</ul>
</section>

<section>
<h2>Contact Form</h2>

<form>
<label>Name:</label>
<input type="text" placeholder="Enter your name">

<label>Email:</label>
<input type="email" placeholder="Enter your email">

<label>Message:</label>
<textarea rows="4" placeholder="Write your message"></textarea>

<button type="submit">Send Message</button>
</form>

</section>

<footer>
© 2026 Basic Website Demo
</footer>

</body>
</html>

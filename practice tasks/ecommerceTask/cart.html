<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porsche Cart</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}
h1{
    text-align:center;
    padding:20px;
    color:#222;
}
.cart-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:30px;
}
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 0 8px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}
.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    transition:transform 0.3s ease;
}

.card:hover img{
    transform:scale(1.05);
}
.card h3{
    margin:10px 0;
}

.card p{
    font-size:18px;
    font-weight:bold;
    color:#333;
}

.remove-btn{
    padding:8px 15px;
    background:#dc3545;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

.remove-btn:hover{
    background:#b02a37;
}
.total{
    text-align:center;
    font-size:24px;
    font-weight:bold;
    margin:20px;
}
.shop-btn{
    display:block;
    width:200px;
    margin:20px auto 40px;
    text-align:center;
    padding:10px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
.shop-btn:hover{
    background:#0056b3;
}
.empty{
    text-align:center;
    font-size:24px;
}
</style>
</head>

<body>

<h1>🛒 Your Porsche Cart</h1>

<div class="cart-container" id="cartContainer"></div>

<div class="total" id="totalPrice"></div>

<a href="index.html" class="shop-btn">Continue Shopping</a>

<script>
let cart = JSON.parse(localStorage.getItem("cart") || "[]");

const container = document.getElementById("cartContainer");
const totalDiv = document.getElementById("totalPrice");
function renderCart(){

    container.innerHTML = "";
    let total = 0;

    if(cart.length === 0){
        container.innerHTML =
        "<h2 class='empty'>Your cart is empty 😢</h2>";
        totalDiv.innerHTML = "";
        return;
    }

    cart.forEach((product,index)=>{

        total += product.price;

        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${product.image}" alt="${product.name}">
            <h3>${product.name}</h3>
            <p>₹${product.price}</p>
            <button class="remove-btn">Remove</button>
        `;

        const removeBtn = card.querySelector(".remove-btn");

        removeBtn.addEventListener("click",()=>{
            cart.splice(index,1);
            localStorage.setItem("cart",JSON.stringify(cart));
            renderCart();
        });

        container.appendChild(card);
    });

    totalDiv.innerHTML = "Total Price: ₹" + total;
}

renderCart();
</script>

</body>
</html>
